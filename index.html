<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cyber Security Audit HUD</title>
    <style>
        body { background-color: #000; color: #00f2ff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .container { border: 2px solid #00f2ff; padding: 20px; box-shadow: 0 0 15px #00f2ff; max-width: 800px; margin: auto; }
        h1 { text-transform: uppercase; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; }
        .score-box { font-size: 3em; text-align: center; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00f2ff; }
        .list-item { border-left: 3px solid #00f2ff; padding: 10px; margin: 10px 0; background: rgba(0, 242, 255, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitoring Object: Audit Report</h1>
        <div id="status">Status: <span id="security-score">Memuat...</span></div>
        <div class="score-box" id="score-display">0%</div>
        <div id="suggestions"></div>
    </div>

    <script>
        // Simulasi mengambil data dari report.json
        const auditData = {
            "skor": 85,
            "saran": [
                "Aktifkan firewall pada port 22",
                "Update library yang rentan di plugin target",
                "Tutup direktori yang terbuka secara publik"
            ]
        };

        document.getElementById('score-display').innerText = auditData.skor + "%";
        const sugDiv = document.getElementById('suggestions');
        auditData.saran.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerText = "> " + item;
            sugDiv.appendChild(div);
        });
    </script>
</body>
</html>
